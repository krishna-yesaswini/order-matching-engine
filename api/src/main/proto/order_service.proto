syntax = "proto3";

package ordermatching;

option java_package = "com.kudirellilkrishnayesaswini.api.grpc";
option java_multiple_files = true;
option java_outer_classname = "OrderServiceProto";

message Order {
  enum Side {
    BUY = 0;
    SELL = 1;
  }

  int64 order_id = 1;
  string symbol = 2;
  Side side = 3;
  int64 price = 4;
  int64 quantity = 5;
}

message Trade {
  int64 buy_order_id = 1;
  int64 sell_order_id = 2;
  string symbol = 3;
  int64 price = 4;
  int64 quantity = 5;
  int64 timestamp = 6;
}

message SubmitOrderRequest {
  string symbol = 1;
  Order.Side side = 2;
  int64 price = 3;
  int64 quantity = 4;
}

message SubmitOrderResponse {
  repeated Trade trades = 1;
}

service OrderService {
  rpc SubmitOrder(SubmitOrderRequest) returns (SubmitOrderResponse);
}
